name: Bug report
description: Report a reproducible problem in the platform.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail so we can reproduce and fix the issue quickly.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: A short description of the problem.
      placeholder: Login form fails with 500 on submit
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List clear, numbered steps.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what should have happened.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what actually happened.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, app version, or commit SHA.
      placeholder: Chrome 124, macOS 14.4, commit abc123
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/screenshots
      description: Paste logs or attach screenshots if available.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Verification
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
